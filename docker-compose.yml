services:
  api:
    build: .
    container_name: educado-api
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      POSTGRES_URI_DEV: postgresql://educado:educado@postgres:5432/educado_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: educado-media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  worker-email:
    build: .
    container_name: educado-worker-email
    command: node build/workers/email-worker.js
    env_file:
      - .env
    environment:
      NODE_ENV: development
      POSTGRES_URI_DEV: postgresql://educado:educado@postgres:5432/educado_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: educado-postgres
    environment:
      POSTGRES_DB: educado_dev
      POSTGRES_USER: educado
      POSTGRES_PASSWORD: educado
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educado -d educado_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: educado-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: educado-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/minio:latest
    container_name: educado-minio-setup
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/educado-media &&
      echo 'Bucket educado-media ready'
      "
    depends_on:
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
