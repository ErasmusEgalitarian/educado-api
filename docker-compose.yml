services:
  api:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      POSTGRES_URI_DEV: postgresql://educado:educado@postgres:5432/educado_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker-email:
    build: .
    command: node build/workers/email-worker.js
    env_file:
      - .env
    environment:
      NODE_ENV: development
      POSTGRES_URI_DEV: postgresql://educado:educado@postgres:5432/educado_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: educado-postgres
    environment:
      POSTGRES_DB: educado_dev
      POSTGRES_USER: educado
      POSTGRES_PASSWORD: educado
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educado -d educado_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: educado-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
